<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT-FIELD // STUDY PROTOCOL v2.0</title>
    <style>
        :root {
            --bg-void: #030305;
            --text-glow: #ffffff;
            --glitch-cyan: #0ff;
            --glitch-magenta: #f0f;
            --glitch-green: #39ff14;
            --ui-dark: rgba(10, 10, 14, 0.85);
            --border-glow: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-glow);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 3px;
            z-index: 100;
            pointer-events: none;
        }

        /* Central Wing Light Field */
        body::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw; height: 75vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(30px);
            z-index: 0;
            pointer-events: none;
        }

        /* Fixed Vertical Pillars */
        .pillar {
            position: absolute;
            top: 10%;
            bottom: 10%;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.3rem;
            letter-spacing: 0.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 2px 0 var(--glitch-cyan), -2px 0 var(--glitch-magenta);
            z-index: 10;
            opacity: 0.7;
            user-select: none;
        }
        .pillar.left { left: 4%; }
        .pillar.right { right: 4%; display: flex; justify-content: flex-end; }

        .pillar-bg {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.08);
            text-shadow: none;
            letter-spacing: 1px;
            margin-right: 8px;
        }

        /* UI Tactical Hub Container */
        .hub {
            position: relative;
            z-index: 20;
            width: 92%;
            max-width: 560px;
            background: var(--ui-dark);
            border: 1px solid var(--border-glow);
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.85), inset 0 0 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            animation: hubGlitch 12s infinite;
        }

        @keyframes hubGlitch {
            0%, 96%, 100% { transform: translate(0); border-color: var(--border-glow); }
            97% { transform: translate(-2px, 1px); border-color: var(--glitch-cyan); }
            98% { transform: translate(2px, -1px); border-color: var(--glitch-magenta); }
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 0 var(--glitch-cyan), -1px 0 var(--glitch-magenta);
            font-weight: bold;
        }

        .protocol-selector {
            background: transparent;
            border: none;
            color: var(--glitch-cyan);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }

        /* Core Matrix Timer */
        .timer-wrap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 14px 0 24px 0;
        }

        .progress-ring {
            position: absolute;
            width: 240px;
            height: 240px;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.07);
            stroke-width: 3;
        }

        .ring-fg {
            fill: none;
            stroke: var(--glitch-cyan);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px currentColor);
            transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
        }

        .ring-fg.critical {
            stroke: var(--glitch-magenta);
            animation: ringPulse 0.8s infinite alternate;
        }

        @keyframes ringPulse {
            0% { filter: drop-shadow(0 0 5px currentColor); }
            100% { filter: drop-shadow(0 0 14px currentColor); }
        }

        .timer-display {
            position: relative;
            font-size: 4rem;
            text-align: center;
            font-weight: bold;
            text-shadow: 3px 0 var(--glitch-cyan), -3px 0 var(--glitch-magenta), 0 0 15px rgba(255, 255, 255, 0.2);
            letter-spacing: 4px;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.85; }
            100% { opacity: 1; text-shadow: 4px 0 var(--glitch-cyan), -4px 0 var(--glitch-magenta), 0 0 25px rgba(255, 255, 255, 0.4); }
        }

        /* Interactive Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            color: var(--text-glow);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.1s ease;
            width: 48%;
        }

        button:hover {
            background: var(--text-glow);
            color: var(--bg-void);
            text-shadow: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            border-color: var(--text-glow);
        }

        /* Telemetry Readout Grid */
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 25px;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .telemetry-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 4px;
            text-align: center;
        }

        .telemetry-label { color: rgba(255, 255, 255, 0.4); margin-bottom: 4px; }
        .telemetry-val { font-weight: bold; text-shadow: 1px 0 var(--glitch-cyan); }
        .telemetry-val.streak-hot { color: var(--glitch-green); text-shadow: 0 0 8px var(--glitch-green); }

        /* Mute Toggle */
        .header-controls { display: flex; align-items: center; gap: 14px; }
        .mute-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 0.7rem;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
        }
        .mute-btn.off { color: var(--glitch-magenta); border-color: var(--glitch-magenta); }

        /* Mobile Safety */
        @media (max-width: 640px) {
            .pillar { display: none; }
            .hub { padding: 18px; width: 94%; }
            .progress-ring { width: 190px; height: 190px; }
            .timer-display { font-size: 2.8rem; }
            .telemetry-grid { font-size: 0.6rem; }
            button { padding: 12px 10px; font-size: 0.75rem; }
        }

        /* Directive Input & Stacked List */
        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--text-glow);
            padding: 12px 8px;
            font-family: inherit;
            outline: none;
            text-shadow: 1px 0 var(--glitch-cyan), -1px 0 var(--glitch-magenta);
            font-size: 0.9rem;
        }

        input[type="text"]:focus {
            border-bottom-color: var(--glitch-cyan);
            background: rgba(255, 255, 255, 0.03);
        }

        .task-list {
            margin-top: 15px;
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .task-text {
            text-shadow: 1px 0 var(--glitch-cyan), -1px 0 var(--glitch-magenta);
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            opacity: 0.35;
            text-shadow: none;
        }

        .delete-btn {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            padding-left: 10px;
            font-weight: bold;
        }
        .delete-btn:hover {
            color: var(--glitch-magenta);
            text-shadow: 0 0 6px var(--glitch-magenta);
        }

        /* Matrix Scattered Field Crosses */
        .cross {
            position: absolute;
            font-size: 9px;
            opacity: 0.4;
            z-index: 5;
            pointer-events: none;
            user-select: none;
        }

        /* --- MOODBOARD ASSET STYLING --- */
        .mood-asset {
            position: absolute;
            width: 250px;
            height: auto;
            object-fit: cover;
            border: 1px solid var(--border-glow);
            box-shadow: 2px 2px 0px var(--glitch-cyan), -2px -2px 0px var(--glitch-magenta);
            opacity: 0.55;
            mix-blend-mode: screen;
            filter: contrast(1.2) saturate(0.8) hue-rotate(-10deg);
            z-index: 5; /* Spawns behind the main hub */
            cursor: grab;
            transition: opacity 0.2s ease, filter 0.2s ease, transform 0.1s;
            user-drag: none;
            -webkit-user-drag: none; /* Prevents default browser ghost-dragging */
        }

        .mood-asset:hover {
            opacity: 0.85;
            filter: contrast(1.5) saturate(1.2);
            border-color: var(--glitch-cyan);
            z-index: 15; /* Pulls slightly forward on hover */
        }

        .mood-asset:active {
            cursor: grabbing;
            opacity: 1;
            transform: scale(0.98);
            box-shadow: 4px 4px 0px var(--glitch-cyan), -4px -4px 0px var(--glitch-magenta);
        }

        /* Custom Streamlined Scrollbar */
        .task-list::-webkit-scrollbar { width: 3px; }
        .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

        /* AT-Field Strength Bar */
        .strength-wrap { margin-bottom: 20px; }
        .strength-label {
            display: flex; justify-content: space-between;
            font-size: 0.65rem; letter-spacing: 1px; color: rgba(255,255,255,0.4);
            margin-bottom: 5px; text-transform: uppercase;
        }
        .strength-track {
            height: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--glitch-magenta), var(--glitch-cyan), var(--glitch-green));
            background-size: 300% 100%;
            box-shadow: 0 0 8px var(--glitch-cyan);
            transition: width 0.8s ease;
            animation: strengthShift 4s linear infinite;
        }
        @keyframes strengthShift { 0% { background-position: 0% 0; } 100% { background-position: 100% 0; } }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .tab-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.35);
            font-family: inherit; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase;
            padding: 6px 10px; cursor: pointer; width: auto; border-bottom: 2px solid transparent;
        }
        .tab-btn.active { color: var(--text-glow); border-bottom-color: var(--glitch-cyan); text-shadow: 1px 0 var(--glitch-cyan); }
        .tab-btn:hover { background: transparent; color: var(--text-glow); box-shadow: none; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Sever Log */
        .log-list { max-height: 180px; overflow-y: auto; list-style: none; }
        .log-item {
            display: flex; justify-content: space-between; padding: 7px 4px;
            border-bottom: 1px dashed rgba(255,255,255,0.06); font-size: 0.78rem;
        }
        .log-item .log-status.complete { color: var(--glitch-green); }
        .log-item .log-status.aborted { color: var(--glitch-magenta); }
        .log-empty { font-size: 0.78rem; color: rgba(255,255,255,0.3); padding: 12px 4px; text-align: center; }

        /* Notes (Memory Dump) */
        .notes-add-btn {
            width: 100%; margin-bottom: 10px; padding: 8px; font-size: 0.75rem;
        }
        .notes-list { list-style: none; max-height: 220px; overflow-y: auto; }
        .note-item {
            border-bottom: 1px dashed rgba(255,255,255,0.08); padding: 8px 4px; cursor: pointer;
        }
        .note-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .note-title { font-size: 0.85rem; font-weight: bold; text-shadow: 1px 0 var(--glitch-cyan); }
        .note-snippet { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .note-editor { display: none; margin-top: 8px; }
        .note-item.open .note-editor { display: block; }
        .note-editor textarea {
            width: 100%; min-height: 90px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15); color: var(--text-glow);
            font-family: inherit; font-size: 0.82rem; padding: 8px; outline: none; resize: vertical;
        }
        .note-editor textarea:focus { border-color: var(--glitch-cyan); }

        /* Pattern Event Toast */
        .toast {
            position: fixed; top: 8%; left: 50%; transform: translate(-50%, -10px);
            background: var(--ui-dark); border: 1px solid var(--glitch-cyan);
            padding: 12px 22px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 1px 0 var(--glitch-cyan), -1px 0 var(--glitch-magenta);
            box-shadow: 0 0 20px rgba(0,255,255,0.25); z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        /* Idle Glitch Escalation */
        body.idle-1 .hub { animation-duration: 7s; }
        body.idle-2 .hub { animation-duration: 3.5s; }
        body.idle-3 .hub { animation-duration: 1.2s; }
        body.idle-3 .cross { animation: crossFlicker 0.35s infinite; }
        @keyframes crossFlicker { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.95; } }

        /* Studio Mode */
        .mode-label {
            text-align: center; font-size: 0.65rem; letter-spacing: 2px;
            color: rgba(255,255,255,0.35); text-transform: uppercase; margin-top: -6px; margin-bottom: 4px;
        }
        .mode-label.tagged { color: var(--glitch-green); text-shadow: 0 0 6px var(--glitch-green); }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .chip {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.55);
            font-family: inherit; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;
            padding: 8px 12px; cursor: pointer; width: auto;
        }
        .chip:hover { background: transparent; color: var(--text-glow); box-shadow: none; border-color: rgba(255,255,255,0.5); }
        .chip.active { color: var(--bg-void); background: var(--glitch-green); border-color: var(--glitch-green); box-shadow: 0 0 10px rgba(57,255,20,0.4); }
        .cat-row { margin-bottom: 12px; }
        .cat-row-head { display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 4px; color: rgba(255,255,255,0.6); }
        .cat-bar-track { height: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
        .cat-bar-fill { height: 100%; background: var(--glitch-green); box-shadow: 0 0 6px var(--glitch-green); transition: width 0.6s ease; }
        .studio-empty { font-size: 0.78rem; color: rgba(255,255,255,0.3); padding: 10px 4px; text-align: center; }

    </style>
</head>
<body>

    <div class="pillar left">
        <span class="pillar-bg">xxxxxxxxxxxxxxxxxxxx</span>觉醒状态不确定
    </div>
    <div class="pillar right">
        系统异常循环<span class="pillar-bg">xxxxxxxxxxxxxxxxxxxx</span>
    </div>

    <div class="hub">
        <div class="header-container">
            <div class="section-title">SYSTEM_SYNC</div>
            <div class="header-controls">
                <button class="mute-btn" id="btn-mute">SND:ON</button>
                <button class="protocol-selector" id="protocol-select">PROTOCOL_01</button>
            </div>
        </div>

        <div class="timer-wrap">
            <svg class="progress-ring" viewBox="0 0 280 280">
                <circle class="ring-bg" cx="140" cy="140" r="130"></circle>
                <circle class="ring-fg" id="ring-fg" cx="140" cy="140" r="130"></circle>
            </svg>
            <div class="timer-display" id="timer">25:00</div>
        </div>
        <div class="mode-label" id="mode-label">MODE: GENERAL</div>

        <div class="controls">
            <button id="btn-toggle">ENGAGE</button>
            <button id="btn-reset">SEVER</button>
        </div>

        <div class="telemetry-grid">
            <div class="telemetry-item">
                <div class="telemetry-label">CYCLES</div>
                <div class="telemetry-val" id="stat-cycles">00</div>
            </div>
            <div class="telemetry-item">
                <div class="telemetry-label">QUEUE_EFF</div>
                <div class="telemetry-val" id="stat-eff">100%</div>
            </div>
            <div class="telemetry-item">
                <div class="telemetry-label">NET_TIME</div>
                <div class="telemetry-val" id="stat-time">000M</div>
            </div>
            <div class="telemetry-item">
                <div class="telemetry-label">STREAK</div>
                <div class="telemetry-val" id="stat-streak">00D</div>
            </div>
        </div>

        <div class="strength-wrap">
            <div class="strength-label"><span>AT-FIELD STRENGTH</span><span id="strength-pct">0%</span></div>
            <div class="strength-track"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" style="margin-top:8px;"><span>SYNC RATIO</span><span id="sync-pct">100%</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-panel="panel-tasks">DIRECTIVES</button>
            <button class="tab-btn" data-panel="panel-studio">STUDIO</button>
            <button class="tab-btn" data-panel="panel-log">SEVER_LOG</button>
            <button class="tab-btn" data-panel="panel-notes">MEMORY_DUMP</button>
        </div>

        <div class="panel" id="panel-studio">
            <div class="chip-row" id="chip-row"></div>
            <div id="studio-breakdown"></div>
        </div>

        <div class="panel active" id="panel-tasks">
            <form id="task-form">
                <input type="text" id="task-input" placeholder="ENTER DIRECTIVE..." autocomplete="off">
            </form>
            <ul class="task-list" id="task-list"></ul>
        </div>

        <div class="panel" id="panel-log">
            <ul class="log-list" id="log-list"></ul>
        </div>

        <div class="panel" id="panel-notes">
            <button class="notes-add-btn" id="btn-add-note">+ NEW FRAGMENT</button>
            <ul class="notes-list" id="notes-list"></ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // --- PREMIUM PSYCHOACOUSTIC ENGINE ---
const AudioEngine = {
    ctx: null,
    muted: false,
    droneNodes: null,
    init() {
        if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if(this.ctx.state === 'suspended') this.ctx.resume();
    },
    click() {
        if(this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(1400, now);
        gain.gain.setValueAtTime(0.02, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.04);
    },
    engage() {
        if(this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.linearRampToValueAtTime(0.05, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.4);
    },
    halt() {
        if(this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.3);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.3);
    },
    sever() {
        if(this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc1 = this.ctx.createOscillator(), osc2 = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc1.type = 'triangle'; osc1.frequency.setValueAtTime(250, now);
        osc2.type = 'sine'; osc2.frequency.setValueAtTime(125, now);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        osc1.connect(gain); osc2.connect(gain); gain.connect(this.ctx.destination);
        osc1.start(); osc2.start();
        osc1.stop(now + 0.5); osc2.stop(now + 0.5);
    },
    alarm() {
        if(this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.linearRampToValueAtTime(300, now + 0.4);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.45);
    },
    startDrone() {
        if(this.muted || this.droneNodes) return;
        this.init();
        const now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator();
        let lfo = this.ctx.createOscillator();
        let lfoGain = this.ctx.createGain();
        let gain = this.ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(55, now);
        lfo.type = 'sine'; lfo.frequency.setValueAtTime(0.08, now);
        lfoGain.gain.setValueAtTime(0.01, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(0.018, now + 2);
        lfo.connect(lfoGain); lfoGain.connect(gain.gain);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); lfo.start();
        this.droneNodes = { osc, lfo, gain };
    },
    stopDrone() {
        if(!this.droneNodes) return;
        const { osc, lfo, gain } = this.droneNodes;
        const now = this.ctx.currentTime;
        gain.gain.cancelScheduledValues(now);
        gain.gain.setValueAtTime(gain.gain.value, now);
        gain.gain.linearRampToValueAtTime(0.0001, now + 0.7);
        osc.stop(now + 0.8); lfo.stop(now + 0.8);
        this.droneNodes = null;
    }
};

// --- BACKGROUND THREAD INSTANTIATION (ANTI-THROTTLE) ---
const workerBlob = new Blob([`
    let timer = null;
    self.onmessage = function(e) {
        if (e.data === 'START') {
            if (timer) clearInterval(timer);
            timer = setInterval(() => self.postMessage('TICK'), 1000);
        } else if (e.data === 'STOP') {
            clearInterval(timer);
            timer = null;
        }
    };
`], { type: 'application/javascript' });
const worker = new Worker(URL.createObjectURL(workerBlob));

// --- MATRIX SCATTER GENERATOR ---
function generateCrosses() {
    const colors = ['#0ff', '#f0f', '#39ff14', '#fff'];
    for(let i=0; i<35; i++) {
        let cross = document.createElement('div');
        cross.className = 'cross';
        cross.innerText = '+';
        cross.style.left = Math.random() * 100 + 'vw';
        cross.style.top = Math.random() * 100 + 'vh';
        cross.style.color = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(cross);
    }
}
generateCrosses();

// --- STATE & PROTOCOL ARCHITECTURE ---
const PROTOCOLS = {
    P1: { name: "PROTOCOL_01", time: 1500 }, // 25 Min Focus
    P2: { name: "PROTOCOL_02", time: 300 },  // 5 Min Break
    P3: { name: "PROTOCOL_03", time: 900 }   // 15 Min Break
};
let currentProtocolKey = 'P1';

const DEFAULT_STATE = {
    tasks: [],
    cycles: 0,
    totalMinutes: 0,
    streak: 0,
    lastActiveDay: null,
    muted: false,
    totalTasksCreated: 0,
    totalTasksCompleted: 0,
    sessionLog: [],
    notes: [],
    currentCategory: null,
    categoryMinutes: { writing: 0, mixing: 0, outreach: 0, practice: 0 }
};
let savedState = {};
try {
    savedState = JSON.parse(localStorage.getItem('at_field_state')) || {};
} catch (e) {
    savedState = {};
}
let state = Object.assign({}, DEFAULT_STATE, savedState);
state.categoryMinutes = Object.assign({}, DEFAULT_STATE.categoryMinutes, state.categoryMinutes || {});
AudioEngine.muted = !!state.muted;

let time = PROTOCOLS[currentProtocolKey].time;
let isRunning = false;

// --- PROGRESS RING SETUP ---
const RING_R = 130;
const RING_C = 2 * Math.PI * RING_R;

// --- DOM MAPPING ---
const UI = {
    display: document.getElementById('timer'),
    btnToggle: document.getElementById('btn-toggle'),
    btnReset: document.getElementById('btn-reset'),
    protocolSelect: document.getElementById('protocol-select'),
    statCycles: document.getElementById('stat-cycles'),
    statEff: document.getElementById('stat-eff'),
    statTime: document.getElementById('stat-time'),
    statStreak: document.getElementById('stat-streak'),
    ringFg: document.getElementById('ring-fg'),
    btnMute: document.getElementById('btn-mute'),
    strengthFill: document.getElementById('strength-fill'),
    strengthPct: document.getElementById('strength-pct'),
    syncPct: document.getElementById('sync-pct'),
    logList: document.getElementById('log-list'),
    notesList: document.getElementById('notes-list'),
    btnAddNote: document.getElementById('btn-add-note'),
    toast: document.getElementById('toast'),
    modeLabel: document.getElementById('mode-label'),
    chipRow: document.getElementById('chip-row'),
    studioBreakdown: document.getElementById('studio-breakdown'),
    form: document.getElementById('task-form'),
    input: document.getElementById('task-input'),
    list: document.getElementById('task-list')
};

// --- CORE LOGIC ---
function saveState() {
    localStorage.setItem('at_field_state', JSON.stringify(state));
    renderMetrics();
}

function renderMetrics() {
    UI.statCycles.innerText = state.cycles.toString().padStart(2, '0');
    UI.statTime.innerText = state.totalMinutes.toString().padStart(3, '0') + 'M';
    UI.statStreak.innerText = state.streak.toString().padStart(2, '0') + 'D';
    UI.statStreak.classList.toggle('streak-hot', state.streak >= 3);
    if(state.tasks.length === 0) {
        UI.statEff.innerText = '100%';
    } else {
        const done = state.tasks.filter(t => t.done).length;
        UI.statEff.innerText = Math.round((done / state.tasks.length) * 100) + '%';
    }
    renderStrength();
}

function renderStrength() {
    const pct = Math.max(0, Math.min(100, Math.round((state.streak / 7) * 100)));
    UI.strengthFill.style.width = pct + '%';
    UI.strengthPct.innerText = pct + '%';
    const syncPct = state.totalTasksCreated === 0 ? 100 : Math.round((state.totalTasksCompleted / state.totalTasksCreated) * 100);
    UI.syncPct.innerText = syncPct + '%';
}

function getTodayStr() {
    return new Date().toISOString().slice(0, 10);
}

function daysBetween(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function checkStreakDecay() {
    if (!state.lastActiveDay) return;
    const gap = daysBetween(state.lastActiveDay, getTodayStr());
    if (gap > 1) {
        state.streak = 0;
        saveState();
    }
}

function updateStreak() {
    const today = getTodayStr();
    if (state.lastActiveDay === today) return;
    const y = new Date();
    y.setDate(y.getDate() - 1);
    const yesterday = y.toISOString().slice(0, 10);
    state.streak = (state.lastActiveDay === yesterday) ? state.streak + 1 : 1;
    state.lastActiveDay = today;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

function updateDisplay() {
    UI.display.innerText = formatTime(time);
    document.title = `[${formatTime(time)}] AT-FIELD`;
    updateRing();
}

function updateRing() {
    const total = PROTOCOLS[currentProtocolKey].time;
    const pct = Math.max(0, Math.min(1, time / total));
    if (!UI.ringFg.style.strokeDasharray) UI.ringFg.style.strokeDasharray = RING_C;
    UI.ringFg.style.strokeDashoffset = RING_C * (1 - pct);
    UI.ringFg.classList.toggle('critical', pct > 0 && pct <= 0.15);
}

// --- PATTERN EVENT TOAST ---
const PATTERN_MESSAGES = [
    'PATTERN BLUE CONFIRMED',
    'SYNCHRONIZATION NOMINAL',
    'AT-FIELD NEUTRALIZED',
    'SEQUENCE COMPLETE',
    'SOUL RESONANCE STABLE',
    'CORE TEMPERATURE NORMAL',
    'NO ANOMALIES DETECTED',
    'DIRECTIVE ABSORBED'
];

function fireToast(msg) {
    UI.toast.innerText = msg;
    UI.toast.classList.add('show');
    setTimeout(() => UI.toast.classList.remove('show'), 2800);
}

// --- SEVER LOG ---
function pushLog(entry) {
    state.sessionLog.unshift(entry);
    if (state.sessionLog.length > 50) state.sessionLog.pop();
    saveState();
    renderLog();
}

function renderLog() {
    UI.logList.innerHTML = '';
    if (state.sessionLog.length === 0) {
        UI.logList.innerHTML = '<li class="log-empty">NO ENTRIES LOGGED</li>';
        return;
    }
    state.sessionLog.forEach(entry => {
        const li = document.createElement('li');
        li.className = 'log-item';
        const left = document.createElement('span');
        const catTag = entry.category ? ` [${entry.category.toUpperCase()}]` : '';
        left.innerText = `${entry.time} // ${entry.protocol}${catTag}`;
        const right = document.createElement('span');
        right.className = 'log-status ' + (entry.completed ? 'complete' : 'aborted');
        right.innerText = entry.completed ? 'COMPLETE' : `ABORTED (${entry.elapsedMin}M)`;
        li.appendChild(left);
        li.appendChild(right);
        UI.logList.appendChild(li);
    });
}

let sessionStartTime = null;
let lastEngageTimestamp = Date.now();

// --- WORKER EVENT LISTENER ---
worker.onmessage = (e) => {
    if (e.data === 'TICK' && time > 0) {
        time--;
        updateDisplay();

        if (time > 0 && time % 60 === 0) {
            state.totalMinutes++;
            if (state.currentCategory && currentProtocolKey === 'P1') {
                state.categoryMinutes[state.currentCategory] = (state.categoryMinutes[state.currentCategory] || 0) + 1;
            }
            saveState();
            renderStudioBreakdown();
        }

        if (time <= 0) {
            worker.postMessage('STOP');
            AudioEngine.stopDrone();
            AudioEngine.alarm();
            UI.display.style.color = "var(--glitch-magenta)";
            UI.btnToggle.innerText = 'ENGAGE';
            isRunning = false;

            if(currentProtocolKey === 'P1') {
                state.cycles++;
                updateStreak();
                fireToast(PATTERN_MESSAGES[Math.floor(Math.random() * PATTERN_MESSAGES.length)]);
            }
            pushLog({
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                protocol: PROTOCOLS[currentProtocolKey].name,
                category: state.currentCategory,
                completed: true,
                elapsedMin: Math.round(PROTOCOLS[currentProtocolKey].time / 60)
            });
            sessionStartTime = null;
            saveState();
        }
    }
};

// --- TACTICAL CONTROLS ---
UI.protocolSelect.addEventListener('click', () => {
    AudioEngine.click();
    if(isRunning) return;

    const keys = Object.keys(PROTOCOLS);
    let idx = keys.indexOf(currentProtocolKey);
    currentProtocolKey = keys[(idx + 1) % keys.length];

    UI.protocolSelect.innerText = PROTOCOLS[currentProtocolKey].name;
    time = PROTOCOLS[currentProtocolKey].time;
    UI.display.style.color = "var(--text-glow)";
    updateDisplay();
});

UI.btnToggle.addEventListener('click', () => {
    if (isRunning) {
        AudioEngine.halt();
        AudioEngine.stopDrone();
        worker.postMessage('STOP');
        UI.btnToggle.innerText = 'ENGAGE';
    } else {
        if(time <= 0) {
            time = PROTOCOLS[currentProtocolKey].time;
            UI.display.style.color = "var(--text-glow)";
        }
        AudioEngine.engage();
        AudioEngine.startDrone();
        worker.postMessage('START');
        UI.btnToggle.innerText = 'HALT';
        sessionStartTime = sessionStartTime || Date.now();
        lastEngageTimestamp = Date.now();
        clearIdleGlitch();
    }
    isRunning = !isRunning;
});

UI.btnReset.addEventListener('click', () => {
    if (isRunning && sessionStartTime) {
        const elapsedMin = Math.max(1, Math.round((PROTOCOLS[currentProtocolKey].time - time) / 60));
        pushLog({
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            protocol: PROTOCOLS[currentProtocolKey].name,
            category: state.currentCategory,
            completed: false,
            elapsedMin
        });
    }
    sessionStartTime = null;
    AudioEngine.sever();
    AudioEngine.stopDrone();
    worker.postMessage('STOP');
    isRunning = false;
    time = PROTOCOLS[currentProtocolKey].time;
    UI.display.style.color = "var(--text-glow)";
    UI.btnToggle.innerText = 'ENGAGE';
    updateDisplay();
});

UI.btnMute.addEventListener('click', () => {
    AudioEngine.muted = !AudioEngine.muted;
    state.muted = AudioEngine.muted;
    if (AudioEngine.muted) AudioEngine.stopDrone();
    else if (isRunning) AudioEngine.startDrone();
    UI.btnMute.innerText = AudioEngine.muted ? 'SND:OFF' : 'SND:ON';
    UI.btnMute.classList.toggle('off', AudioEngine.muted);
    saveState();
});

// --- DIRECTIVES BUFFER ---
function renderTasks() {
    UI.list.innerHTML = '';
    state.tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = `task-item ${task.done ? 'done' : ''}`;

        const textSpan = document.createElement('span');
        textSpan.className = 'task-text';
        textSpan.innerText = '> ' + task.text.toUpperCase();
        textSpan.onclick = () => {
            AudioEngine.click();
            state.tasks[index].done = !state.tasks[index].done;
            state.totalTasksCompleted += state.tasks[index].done ? 1 : -1;
            saveState();
            renderTasks();
        };

        const delSpan = document.createElement('span');
        delSpan.className = 'delete-btn';
        delSpan.innerText = '[X]';
        delSpan.onclick = () => {
            AudioEngine.click();
            state.tasks.splice(index, 1);
            saveState();
            renderTasks();
        };

        li.appendChild(textSpan);
        li.appendChild(delSpan);
        UI.list.appendChild(li);
    });
}

UI.form.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = UI.input.value.trim();
    if(!val) return;

    AudioEngine.click();
    state.tasks.push({ text: val, done: false });
    state.totalTasksCreated++;
    saveState();
    renderTasks();
    UI.input.value = '';
});

// --- NEURAL MOODBOARD: DRAG & DROP MATRIX ---
const dropZone = document.body;

// Neutralize default browser hijacking
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

// Intercept Drop Event
dropZone.addEventListener('drop', (e) => {
    AudioEngine.click(); // Tactile feedback on drop
    const files = e.dataTransfer.files;

    for (let i = 0; i < files.length; i++) {
        if (!files[i].type.startsWith('image/')) continue; // Reject non-images

        const reader = new FileReader();
        reader.readAsDataURL(files[i]);

        reader.onloadend = () => {
            const img = document.createElement('img');
            img.src = reader.result;
            img.className = 'mood-asset';

            // Spawn logic: Center on cursor drop coordinates with slight scatter
            const scatterX = (Math.random() - 0.5) * 40;
            const scatterY = (Math.random() - 0.5) * 40;

            document.body.appendChild(img);

            // Calculate center offset after appending to get actual dimensions
            img.onload = () => {
                img.style.left = (e.clientX - (img.clientWidth / 2) + scatterX) + 'px';
                img.style.top = (e.clientY - (img.clientHeight / 2) + scatterY) + 'px';
            };

            // Custom Drag Mechanics
            let isDragging = false, startX, startY, initialX, initialY;

            img.addEventListener('mousedown', (dragStartEvent) => {
                isDragging = true;
                AudioEngine.click();

                startX = dragStartEvent.clientX;
                startY = dragStartEvent.clientY;
                initialX = img.offsetLeft;
                initialY = img.offsetTop;

                // Temporarily boost z-index to drag over other images
                img.style.zIndex = 100;
            });

            window.addEventListener('mousemove', (dragMoveEvent) => {
                if (!isDragging) return;
                img.style.left = (initialX + dragMoveEvent.clientX - startX) + 'px';
                img.style.top = (initialY + dragMoveEvent.clientY - startY) + 'px';
            });

            window.addEventListener('mouseup', () => {
                if(isDragging) {
                    isDragging = false;
                    img.style.zIndex = 5; // Reset to background
                }
            });

          // --- SCROLL-TO-SCALE MECHANICS ---
            img.addEventListener('wheel', (scrollEvent) => {
                scrollEvent.preventDefault(); // Sever default browser page scroll

                // Throttle audio feedback to prevent distortion on rapid scroll
                if(Math.random() > 0.8) AudioEngine.click();

                let currentWidth = img.offsetWidth;
                const scaleFriction = 25; // Pixel manipulation per scroll tick

                if (scrollEvent.deltaY < 0) {
                    currentWidth += scaleFriction; // Up = Enlarge
                } else {
                    currentWidth -= scaleFriction; // Down = Shrink
                }

                // Hard limits to prevent DOM breaking (100px min, 1200px max)
                currentWidth = Math.max(100, Math.min(currentWidth, 1200));

                img.style.width = currentWidth + 'px';
            });

            // Double Click to Sever (Delete)
            img.addEventListener('dblclick', () => {
                AudioEngine.sever();
                img.remove();
            });
        };
    }
});

// --- TAB SWITCHING ---
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        AudioEngine.click();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.panel).classList.add('active');
    });
});

// --- STUDIO MODE (MUSIC SESSION CATEGORIES) ---
const CATEGORIES = [
    { key: 'writing', label: 'WRITING' },
    { key: 'mixing', label: 'MIXING' },
    { key: 'outreach', label: 'OUTREACH' },
    { key: 'practice', label: 'PRACTICE' }
];

function renderModeLabel() {
    if (state.currentCategory) {
        const cat = CATEGORIES.find(c => c.key === state.currentCategory);
        UI.modeLabel.innerText = 'MODE: ' + (cat ? cat.label : 'GENERAL');
        UI.modeLabel.classList.add('tagged');
    } else {
        UI.modeLabel.innerText = 'MODE: GENERAL';
        UI.modeLabel.classList.remove('tagged');
    }
}

function renderChips() {
    UI.chipRow.innerHTML = '';
    CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (state.currentCategory === cat.key ? ' active' : '');
        btn.innerText = cat.label;
        btn.onclick = () => {
            AudioEngine.click();
            state.currentCategory = (state.currentCategory === cat.key) ? null : cat.key;
            saveState();
            renderChips();
            renderModeLabel();
        };
        UI.chipRow.appendChild(btn);
    });
}

function renderStudioBreakdown() {
    const total = CATEGORIES.reduce((sum, c) => sum + (state.categoryMinutes[c.key] || 0), 0);
    if (total === 0) {
        UI.studioBreakdown.innerHTML = '<div class="studio-empty">NO STUDIO HOURS LOGGED YET — TAG A SESSION ABOVE</div>';
        return;
    }
    UI.studioBreakdown.innerHTML = '';
    CATEGORIES.forEach(cat => {
        const mins = state.categoryMinutes[cat.key] || 0;
        const pct = total === 0 ? 0 : Math.round((mins / total) * 100);
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.innerHTML = `
            <div class="cat-row-head"><span>${cat.label}</span><span>${mins}M // ${pct}%</span></div>
            <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
        `;
        UI.studioBreakdown.appendChild(row);
    });
}

function renderStudio() {
    renderChips();
    renderStudioBreakdown();
    renderModeLabel();
}


function renderNotes() {
    UI.notesList.innerHTML = '';
    if (state.notes.length === 0) {
        UI.notesList.innerHTML = '<li class="log-empty">NO FRAGMENTS STORED</li>';
        return;
    }
    state.notes.slice().reverse().forEach(note => {
        const realIndex = state.notes.findIndex(n => n.id === note.id);
        const li = document.createElement('li');
        li.className = 'note-item';

        const row = document.createElement('div');
        row.className = 'note-row';

        const titleWrap = document.createElement('div');
        const firstLine = (note.body.split('\n')[0] || 'UNTITLED').slice(0, 40);
        const rest = note.body.split('\n').slice(1).join(' ').trim().slice(0, 60);
        const title = document.createElement('div');
        title.className = 'note-title';
        title.innerText = firstLine || 'UNTITLED';
        const snippet = document.createElement('div');
        snippet.className = 'note-snippet';
        snippet.innerText = rest;
        titleWrap.appendChild(title);
        titleWrap.appendChild(snippet);

        const delSpan = document.createElement('span');
        delSpan.className = 'delete-btn';
        delSpan.innerText = '[X]';
        delSpan.onclick = (ev) => {
            ev.stopPropagation();
            AudioEngine.sever();
            state.notes.splice(realIndex, 1);
            saveState();
            renderNotes();
        };

        row.appendChild(titleWrap);
        row.appendChild(delSpan);
        li.appendChild(row);

        const editorWrap = document.createElement('div');
        editorWrap.className = 'note-editor';
        const textarea = document.createElement('textarea');
        textarea.value = note.body;
        textarea.placeholder = 'TRANSMIT...';
        let debounce;
        textarea.addEventListener('input', () => {
            clearTimeout(debounce);
            debounce = setTimeout(() => {
                state.notes[realIndex].body = textarea.value;
                state.notes[realIndex].updatedAt = Date.now();
                saveState();
            }, 400);
        });
        textarea.addEventListener('click', (ev) => ev.stopPropagation());
        editorWrap.appendChild(textarea);
        li.appendChild(editorWrap);

        row.onclick = () => {
            const wasOpen = li.classList.contains('open');
            document.querySelectorAll('.note-item.open').forEach(o => o.classList.remove('open'));
            if (!wasOpen) {
                li.classList.add('open');
                setTimeout(() => textarea.focus(), 50);
            }
        };

        UI.notesList.appendChild(li);
    });
}

UI.btnAddNote.addEventListener('click', () => {
    AudioEngine.click();
    state.notes.push({ id: Date.now().toString(36), body: '', updatedAt: Date.now() });
    saveState();
    renderNotes();
    setTimeout(() => {
        const first = UI.notesList.querySelector('.note-item');
        if (first) {
            first.classList.add('open');
            const ta = first.querySelector('textarea');
            if (ta) ta.focus();
        }
    }, 50);
});

// --- IDLE GLITCH ESCALATION ---
function clearIdleGlitch() {
    document.body.classList.remove('idle-1', 'idle-2', 'idle-3');
}

setInterval(() => {
    if (isRunning) { clearIdleGlitch(); return; }
    const idleMin = (Date.now() - lastEngageTimestamp) / 60000;
    clearIdleGlitch();
    if (idleMin >= 10) document.body.classList.add('idle-3');
    else if (idleMin >= 6) document.body.classList.add('idle-2');
    else if (idleMin >= 3) document.body.classList.add('idle-1');
}, 15000);

// --- BOOT SEQUENCE ---
document.body.addEventListener('click', () => {
    if(AudioEngine.ctx && AudioEngine.ctx.state === 'suspended') {
        AudioEngine.ctx.resume();
    }
}, { once: true });

checkStreakDecay();
renderTasks();
renderMetrics();
renderLog();
renderNotes();
renderStudio();
updateDisplay();
UI.btnMute.innerText = AudioEngine.muted ? 'SND:OFF' : 'SND:ON';
UI.btnMute.classList.toggle('off', AudioEngine.muted);
         </script>
